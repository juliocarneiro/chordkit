name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish chordkit
        run: npm publish --workspace=packages/chordkit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @chordkit/dictionary
        run: npm publish --workspace=packages/dictionary --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @chordkit/theory
        run: npm publish --workspace=packages/theory --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @chordkit/parser
        run: npm publish --workspace=packages/parser --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @chordkit/react
        run: npm publish --workspace=packages/react --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @chordkit/detect
        run: npm publish --workspace=packages/detect --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
